# arxiv-daily 配置文件
# 复制为 config.local.yaml 并修改以覆盖默认值

arxiv:
  keywords:
    - "portrait generation"
    - "image-to-image"
    - "text-to-image"
  max_results_per_keyword: 50
  days_back: 1
  categories: ["cs.CV", "cs.AI", "cs.LG"]

feishu:
  webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/your-webhook-token"  # 飞书机器人 webhook 地址
  web_url: "xxx.xxx.xxx.xxx"  # 本机IP地址

translate:
  api: "free"  # "free" 用 deep-translator, "openai" 用 OpenAI API
  openai_api_key: ""
  openai_base_url: "https://api.openai.com/v1"
  openai_model: "gpt-4o-mini"

local:
  data_dir: "./data"
  pdf_dir: "./pdfs"
